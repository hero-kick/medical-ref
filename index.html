<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>医療参照ツール</title>
  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1a6b9a">
  <!-- iOS ホーム画面追加サポート -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="医療参照">
  <link rel="apple-touch-icon" href="icon.svg">
  <style>
    /* ===== リセット・基本 ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f5f5;
      --surface: #ffffff;
      --border: #d0d0d0;
      --text: #1a1a1a;
      --text-sub: #555;
      --accent: #1a6b9a;
      --accent-bg: #eaf3fa;
      --warn: #7a4400;
      --warn-bg: #fff5e0;
      --tag-bg: #e8e8e8;
      --radius: 10px;
      --shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #121212;
        --surface: #1e1e1e;
        --border: #333;
        --text: #e8e8e8;
        --text-sub: #aaa;
        --accent: #5aabdb;
        --accent-bg: #1a2f3d;
        --warn: #f0c060;
        --warn-bg: #2a1e00;
        --tag-bg: #2a2a2a;
        --shadow: 0 1px 4px rgba(0,0,0,0.4);
      }
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      font-size: 16px;
      line-height: 1.6;
      max-width: 680px;
      margin: 0 auto;
      padding: 0 0 40px;
    }

    /* ===== ヘッダー ===== */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 16px 12px;
      position: sticky;
      top: 0;
      z-index: 10;
      box-shadow: var(--shadow);
    }
    header h1 {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.02em;
      margin-bottom: 10px;
    }
    header h1 span {
      font-size: 12px;
      font-weight: 400;
      color: var(--text-sub);
      margin-left: 8px;
    }
    #search {
      width: 100%;
      padding: 10px 14px;
      font-size: 16px; /* 16px以上でiOSズームを防ぐ */
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg);
      color: var(--text);
      outline: none;
      appearance: none;
    }
    #search:focus { border-color: var(--accent); }

    /* ===== 項目カード ===== */
    #item-list {
      padding: 12px 12px 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .item-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .item-card[hidden] { display: none; }

    /* <details>/<summary> で折りたたみ */
    details summary {
      list-style: none;
      cursor: pointer;
      padding: 16px;
      user-select: none;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      -webkit-tap-highlight-color: transparent;
    }
    details summary::-webkit-details-marker { display: none; }
    .summary-icon {
      flex-shrink: 0;
      width: 28px;
      height: 28px;
      border: 1px solid var(--border);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      color: var(--text-sub);
      transition: transform 0.2s;
    }
    details[open] .summary-icon { transform: rotate(90deg); }
    .summary-text { flex: 1; }
    .summary-title {
      font-size: 16px;
      font-weight: 700;
      display: block;
      margin-bottom: 2px;
    }
    .summary-label {
      font-size: 13px;
      color: var(--text-sub);
    }

    /* ===== 詳細コンテンツ ===== */
    .detail-body {
      padding: 0 16px 16px;
      border-top: 1px solid var(--border);
    }
    .section {
      margin-top: 14px;
    }
    .section-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-sub);
      margin-bottom: 6px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 4px;
    }
    .section p,
    .section li {
      font-size: 14px;
      line-height: 1.65;
    }
    .section ul, .section ol {
      padding-left: 18px;
    }
    .section li + li { margin-top: 3px; }

    /* 表 */
    .detail-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      margin-top: 4px;
    }
    .detail-table th,
    .detail-table td {
      border: 1px solid var(--border);
      padding: 6px 8px;
      text-align: left;
      vertical-align: top;
    }
    .detail-table thead th {
      background: var(--tag-bg);
      font-weight: 700;
    }
    .detail-table tr:nth-child(even) td { background: var(--bg); }

    /* 注意・警告ボックス */
    .warn-box {
      background: var(--warn-bg);
      border-left: 3px solid var(--warn);
      padding: 8px 12px;
      border-radius: 0 6px 6px 0;
      font-size: 13px;
      color: var(--warn);
      margin-top: 6px;
    }

    /* TODO バッジ */
    .badge-todo {
      display: inline-block;
      background: var(--warn-bg);
      color: var(--warn);
      border: 1px solid var(--warn);
      border-radius: 4px;
      font-size: 11px;
      padding: 1px 6px;
      margin-left: 6px;
      vertical-align: middle;
      font-weight: 700;
    }

    /* 出典 */
    .source-box {
      background: var(--accent-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 12px;
      font-size: 13px;
      margin-top: 6px;
    }
    .source-box dt {
      font-weight: 700;
      color: var(--text-sub);
      font-size: 11px;
      letter-spacing: 0.06em;
      margin-top: 6px;
    }
    .source-box dt:first-child { margin-top: 0; }
    .source-box dd { margin-left: 0; color: var(--text); }

    /* PDFボタン */
    .pdf-btn {
      display: block;
      width: 100%;
      margin-top: 14px;
      padding: 13px;
      background: var(--accent);
      color: #fff;
      text-align: center;
      border-radius: 8px;
      text-decoration: none;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.02em;
      border: none;
      cursor: pointer;
      font-family: inherit;
    }
    .pdf-btn:hover { opacity: 0.9; }
    .pdf-btn-disabled {
      background: var(--tag-bg);
      color: var(--text-sub);
      cursor: default;
    }

    /* 更新日 */
    .updated-at {
      font-size: 12px;
      color: var(--text-sub);
      text-align: right;
      margin-top: 10px;
    }


    /* 免責 */
    #disclaimer {
      margin: 16px 12px 0;
      padding: 10px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 12px;
      color: var(--text-sub);
      line-height: 1.6;
    }

    /* 空状態 */
    #empty-msg {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-sub);
      font-size: 15px;
    }
  </style>
</head>
<body>

<header>
  <h1>医療参照ツール <span>療養型病院 日常確認用</span></h1>
  <input type="search" id="search" placeholder="キーワードで検索..." autocomplete="off">
</header>


<p id="disclaimer">
  このツールは個人用の参照補助です。診療・ケアの判断は必ず最新の公式資料・施設基準・主治医の指示に従ってください。
</p>

<div id="item-list"></div>
<p id="empty-msg" hidden>該当する項目がありません</p>

<script>

    keywords: ["検索", "キーワード"],   // 検索に使うタグ

    updatedAt: "2024-xx-xx",

*/

  {

    summary: `
      <p style="font-size:12px; color:var(--text-sub); margin-bottom:6px">令和6年改定：疾患・状態／処置等／ADL の3軸で評価（計30分類）</p>

      <p style="font-weight:700; margin-bottom:4px">疾患・状態</p>
      <table class="detail-table">

            </td>

        <li>各傷病名に「発病から死亡までの期間」を記載する（例：2年、3か月）</li>
        <li>「寝たきり」「ADL低下」は傷病名でないため記載不可</li>
        <li>死亡時刻は<strong>死亡確認時刻ではなく死亡時刻</strong>を記入（救急搬送中のみ確認時刻可）</li>
      </ul>
    `,
    noteTemplate: "I欄\n  (ア) 直接死因：                （期間：  ）\n  (イ) (ア)の原因：              （期間：  ）\n  (ウ) (イ)の原因：              （期間：  ）\nII欄（経過に影響した傷病）：\n死因の種類：1病死及び自然死\n備考：",
    sourceTitle: "死亡診断書（死体検案書）記入マニュアル 令和8年度版（厚生労働省）",
    sourceFile: "",
    sourcePages: "p9〜p22（死亡の原因・参考①原死因の決め方）",
    updatedAt: "2026-04-07（令和8年度版マニュアルを反映）",
  },

]; // ITEMS 配列ここまで

// ============================================================
//  UIレンダリング
// ============================================================

function buildPdfLink(item) {
  if (item.sourceFile) {
    // window.open はユーザー操作起点のため iOS Safari (file://) でも新規タブで開ける
    const url = item.sourceFile.replace(/'/g, '%27');
    return `<button class="pdf-btn" type="button" onclick="window.open('${url}', '_blank', 'noopener')">公式PDFを開く（${item.sourceTitle}）</button>`;
  }
  return `<span class="pdf-btn pdf-btn-disabled">PDFファイル未設定（pdf/フォルダに配置後 sourceFile を更新）</span>`;
}

function renderItem(item) {
  const card = document.createElement("div");
  card.className = "item-card";
  card.dataset.id = item.id;
  card.dataset.search = [item.title, ...(item.keywords || [])].join(" ").toLowerCase();

  card.innerHTML = `
    <details>
      <summary>
        <span class="summary-icon">▶</span>
        <span class="summary-text">
          <span class="summary-title">${item.title}</span>
          <span class="summary-label">${item.shortLabel}</span>
        </span>
      </summary>
      <div class="detail-body">

        <div class="section" style="margin-top:10px">
          ${item.summary}
        </div>

        <div class="section">
          <p class="section-title">迷いやすいポイント</p>
          ${item.trickyPoints}
        </div>

        <div class="section">
          <p class="section-title">記載メモ（テンプレート）</p>
          <pre style="font-size:13px; white-space:pre-wrap; color:var(--text-sub); background:var(--bg); border:1px solid var(--border); border-radius:6px; padding:10px;">${item.noteTemplate}</pre>
        </div>

        <div class="section">
          <p class="section-title">出典</p>
          <dl class="source-box">
            <dt>資料名</dt>
            <dd>${item.sourceTitle}</dd>
            <dt>該当ページ</dt>
            <dd>${item.sourcePages}</dd>
          </dl>
          ${buildPdfLink(item)}
        </div>

        <p class="updated-at">更新日: ${item.updatedAt}</p>

      </div>
    </details>
  `;
  return card;
}

const listEl = document.getElementById("item-list");
const emptyEl = document.getElementById("empty-msg");

// 全項目を一度描画
ITEMS.forEach(item => listEl.appendChild(renderItem(item)));

// ============================================================
//  検索
// ============================================================
document.getElementById("search").addEventListener("input", function () {
  const q = this.value.trim().toLowerCase();
  let visible = 0;
  document.querySelectorAll(".item-card").forEach(card => {
    const hit = !q || card.dataset.search.includes(q);
    card.hidden = !hit;
    if (hit) visible++;
  });
  emptyEl.hidden = visible > 0;
});

// ============================================================
//  PWA: Service Worker 登録（サイレント）
// ============================================================

(function () {
  if (location.protocol === 'file:') return;
  if (!('serviceWorker' in navigator)) return;
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}());
</script>
</body>
</html>
