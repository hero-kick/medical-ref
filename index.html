<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>医療参照ツール</title>
  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1a6b9a">
  <!-- iOS ホーム画面追加サポート -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="医療参照">
  <link rel="apple-touch-icon" href="icon.svg">
  <style>
    /* ===== リセット・基本 ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f5f5;
      --surface: #ffffff;
      --border: #d0d0d0;
      --text: #1a1a1a;
      --text-sub: #555;
      --accent: #1a6b9a;
      --accent-bg: #eaf3fa;
      --warn: #7a4400;
      --warn-bg: #fff5e0;
      --tag-bg: #e8e8e8;
      --radius: 10px;
      --shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #121212;
        --surface: #1e1e1e;
        --border: #333;
        --text: #e8e8e8;
        --text-sub: #aaa;
        --accent: #5aabdb;
        --accent-bg: #1a2f3d;
        --warn: #f0c060;
        --warn-bg: #2a1e00;
        --tag-bg: #2a2a2a;
        --shadow: 0 1px 4px rgba(0,0,0,0.4);
      }
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      font-size: 16px;
      line-height: 1.6;
      max-width: 680px;
      margin: 0 auto;
      padding: 0 0 40px;
    }

    /* ===== ヘッダー ===== */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 16px 12px;
      position: sticky;
      top: 0;
      z-index: 10;
      box-shadow: var(--shadow);
    }
    header h1 {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.02em;
      margin-bottom: 10px;
    }
    header h1 span {
      font-size: 12px;
      font-weight: 400;
      color: var(--text-sub);
      margin-left: 8px;
    }
    #search {
      width: 100%;
      padding: 10px 14px;
      font-size: 16px; /* 16px以上でiOSズームを防ぐ */
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg);
      color: var(--text);
      outline: none;
      appearance: none;
    }
    #search:focus { border-color: var(--accent); }

    /* ===== 項目カード ===== */
    #item-list {
      padding: 12px 12px 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .item-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .item-card[hidden] { display: none; }

    /* <details>/<summary> で折りたたみ */
    details summary {
      list-style: none;
      cursor: pointer;
      padding: 16px;
      user-select: none;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      -webkit-tap-highlight-color: transparent;
    }
    details summary::-webkit-details-marker { display: none; }
    .summary-icon {
      flex-shrink: 0;
      width: 28px;
      height: 28px;
      border: 1px solid var(--border);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      color: var(--text-sub);
      transition: transform 0.2s;
    }
    details[open] .summary-icon { transform: rotate(90deg); }
    .summary-text { flex: 1; }
    .summary-title {
      font-size: 16px;
      font-weight: 700;
      display: block;
      margin-bottom: 2px;
    }
    .summary-label {
      font-size: 13px;
      color: var(--text-sub);
    }

    /* ===== 詳細コンテンツ ===== */
    .detail-body {
      padding: 0 16px 16px;
      border-top: 1px solid var(--border);
    }
    .section {
      margin-top: 14px;
    }
    .section-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-sub);
      margin-bottom: 6px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 4px;
    }
    .section p,
    .section li {
      font-size: 14px;
      line-height: 1.65;
    }
    .section ul, .section ol {
      padding-left: 18px;
    }
    .section li + li { margin-top: 3px; }

    /* 表 */
    .detail-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      margin-top: 4px;
    }
    .detail-table th,
    .detail-table td {
      border: 1px solid var(--border);
      padding: 6px 8px;
      text-align: left;
      vertical-align: top;
    }
    .detail-table thead th {
      background: var(--tag-bg);
      font-weight: 700;
    }
    .detail-table tr:nth-child(even) td { background: var(--bg); }

    /* 注意・警告ボックス */
    .warn-box {
      background: var(--warn-bg);
      border-left: 3px solid var(--warn);
      padding: 8px 12px;
      border-radius: 0 6px 6px 0;
      font-size: 13px;
      color: var(--warn);
      margin-top: 6px;
    }

    /* TODO バッジ */
    .badge-todo {
      display: inline-block;
      background: var(--warn-bg);
      color: var(--warn);
      border: 1px solid var(--warn);
      border-radius: 4px;
      font-size: 11px;
      padding: 1px 6px;
      margin-left: 6px;
      vertical-align: middle;
      font-weight: 700;
    }

    /* 出典 */
    .source-box {
      background: var(--accent-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 12px;
      font-size: 13px;
      margin-top: 6px;
    }
    .source-box dt {
      font-weight: 700;
      color: var(--text-sub);
      font-size: 11px;
      letter-spacing: 0.06em;
      margin-top: 6px;
    }
    .source-box dt:first-child { margin-top: 0; }
    .source-box dd { margin-left: 0; color: var(--text); }

    /* PDFボタン */
    .pdf-btn {
      display: block;
      width: 100%;
      margin-top: 14px;
      padding: 13px;
      background: var(--accent);
      color: #fff;
      text-align: center;
      border-radius: 8px;
      text-decoration: none;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }
    .pdf-btn:hover { opacity: 0.9; }
    .pdf-btn-disabled {
      background: var(--tag-bg);
      color: var(--text-sub);
      cursor: default;
    }

    /* 更新日 */
    .updated-at {
      font-size: 12px;
      color: var(--text-sub);
      text-align: right;
      margin-top: 10px;
    }

    /* インストールバナー */
    #install-banner {
      margin: 10px 12px 0;
      padding: 12px 14px;
      background: var(--accent-bg);
      border: 1px solid var(--accent);
      border-radius: var(--radius);
      font-size: 13px;
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }
    #install-banner .ib-body { flex: 1; }
    #install-banner h3 {
      font-size: 13px;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 5px;
    }
    #install-banner p { margin: 2px 0; line-height: 1.6; }
    #install-btn {
      display: inline-block;
      margin-top: 8px;
      padding: 7px 14px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }
    #install-close {
      flex-shrink: 0;
      width: 28px;
      height: 28px;
      border: none;
      background: transparent;
      color: var(--text-sub);
      font-size: 18px;
      cursor: pointer;
      line-height: 1;
      padding: 0;
    }
    #sw-status { font-size: 12px; color: var(--text-sub); margin-top: 4px; }

    /* 免責 */
    #disclaimer {
      margin: 16px 12px 0;
      padding: 10px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 12px;
      color: var(--text-sub);
      line-height: 1.6;
    }

    /* 空状態 */
    #empty-msg {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-sub);
      font-size: 15px;
    }
  </style>
</head>
<body>

<header>
  <h1>医療参照ツール <span>療養型病院 日常確認用</span></h1>
  <input type="search" id="search" placeholder="キーワードで検索..." autocomplete="off">
</header>

<div id="install-banner" hidden>
  <div class="ib-body">
    <h3>📱 スマホでオフライン利用する</h3>
    <p id="ib-url" style="font-family:monospace; color:var(--accent)"></p>
    <p id="ib-ios" hidden>Safari の <strong>共有ボタン（□↑）→「ホーム画面に追加」</strong></p>
    <p id="ib-android" hidden>Chrome のメニュー → <strong>「ホーム画面に追加」</strong></p>
    <button id="install-btn" hidden>ホーム画面に追加</button>
    <p id="sw-status">⏳ オフライン用データを準備中…</p>
  </div>
  <button id="install-close" title="閉じる（次回から表示しない）">×</button>
</div>

<p id="disclaimer">
  このツールは個人用の参照補助です。診療・ケアの判断は必ず最新の公式資料・施設基準・主治医の指示に従ってください。
</p>

<div id="item-list"></div>
<p id="empty-msg" hidden>該当する項目がありません</p>

<script>
// ============================================================
//  データ定義
//  1項目を追加するには、ITEMS 配列の末尾に以下テンプレートを
//  コピーして値を埋めてください。HTMLは変更不要です。
// ============================================================

/*
  --- 項目追加テンプレート ---
  {
    id: "unique_id",              // 重複しない英数字ID
    title: "項目名",
    shortLabel: "一言説明",
    keywords: ["検索", "キーワード"],   // 検索に使うタグ
    summary: `
      <p>ここに要約を書く（HTML使用可）</p>
    `,
    trickyPoints: `
      <ul>
        <li>迷いやすいポイント1</li>
      </ul>
    `,
    noteTemplate: "記録メモ欄テンプレート文字列",
    sourceTitle: "出典資料名",
    sourceFile: "pdf/filename.pdf",  // pdf/フォルダに置いたファイル名
    sourcePages: "p.1〜5",
    updatedAt: "2024-xx-xx",
  },
*/

const ITEMS = [

  // ============================================================
  //  1. 医療区分
  //  出典: 令和6年度診療報酬改定 療養病棟入院基本料 施設基準（厚生労働省）
  //  参考: https://www.pt-ot-st.net/contents4/medical-treatment-reiwa-6/department/2277
  // ============================================================
  {
    id: "iryo_kubun",
    title: "医療区分",
    shortLabel: "療養病棟の入院基本料算定区分（令和6年改定・30分類）",
    keywords: ["医療区分", "療養病棟", "入院基本料", "ADL区分", "令和6年", "中心静脈栄養", "経腸栄養"],
    summary: `
      <p style="font-size:12px; color:var(--text-sub); margin-bottom:6px">令和6年改定：疾患・状態／処置等／ADL の3軸で評価（計30分類）</p>

      <p style="font-weight:700; margin-bottom:4px">疾患・状態</p>
      <table class="detail-table">
        <thead><tr><th style="width:4em">区分</th><th>該当する疾患・状態（代表例）</th></tr></thead>
        <tbody>
          <tr>
            <td><strong>3</strong></td>
            <td>スモン／<strong>常時監視・管理</strong>が必要な状態</td>
          </tr>
          <tr>
            <td><strong>2</strong></td>
            <td>
              筋ジストロフィー症・多発性硬化症・ALS<br>
              パーキンソン病関連疾患・指定難病（重症）<br>
              頸椎損傷による四肢麻痺<br>
              COPD（ヒュー・ジョーンズV度）<br>
              消化管出血の反復継続状態
            </td>
          </tr>
          <tr><td><strong>1</strong></td><td>上記以外</td></tr>
        </tbody>
      </table>

      <p style="font-weight:700; margin:10px 0 4px">処置等</p>
      <table class="detail-table">
        <thead><tr><th style="width:4em">区分</th><th>該当する処置（代表例）</th></tr></thead>
        <tbody>
          <tr>
            <td><strong>3</strong></td>
            <td>
              中心静脈栄養（対象疾患あり <em>または</em> 開始<u>30日以内</u>）<br>
              人工呼吸器／気管切開・挿管＋発熱<br>
              ドレーン・胸腹腔洗浄<br>
              感染症による隔離室管理<br>
              酸素療法（高密度治療）
            </td>
          </tr>
          <tr>
            <td><strong>2</strong></td>
            <td>
              中心静脈栄養（対象疾患なし・開始<u>30日超</u>）<span style="color:var(--warn)">←R6改定で3→2</span><br>
              肺炎・尿路感染等への抗菌薬投与<br>
              褥瘡処置（重度）・喀痰吸引（1日8回以上）<br>
              経腸栄養（発熱・嘔吐伴う）・酸素療法（高密度以外）<br>
              リハビリテーション（発症30日以内）
            </td>
          </tr>
          <tr><td><strong>1</strong></td><td>上記以外</td></tr>
        </tbody>
      </table>

      <p style="font-weight:700; margin:10px 0 4px">ADL区分</p>
      <table class="detail-table">
        <thead><tr><th style="width:4em">区分</th><th>スコア目安</th></tr></thead>
        <tbody>
          <tr><td><strong>3</strong></td><td>23点以下（ほぼ全介助）</td></tr>
          <tr><td><strong>2</strong></td><td>24〜47点</td></tr>
          <tr><td><strong>1</strong></td><td>48点以上（比較的自立）</td></tr>
        </tbody>
      </table>
      <p style="font-size:13px; margin-top:8px; color:var(--text-sub)">新設：経腸栄養管理加算 300点/日（7日限度）</p>
    `,
    trickyPoints: `
      <ul>
        <li><strong>中心静脈栄養の区分が変わった（令和6年改定）</strong>：対象疾患がある場合または開始30日以内→区分3、それ以外の長期継続→区分2</li>
        <li>「疾患・状態」と「処置等」は<strong>別々に評価</strong>し、高い方を採用するのではなく組み合わせで30分類のいずれかに決まる</li>
        <li>ADL区分は、別紙8「医療区分・ADL区分等に係る評価票」を用いて<strong>毎日</strong>評価・記録する</li>
        <li>「喀痰吸引1日8回以上」は開始時間・回数の記録が算定根拠となる</li>
        <li>「高密度治療を要する酸素療法（区分3）」と通常の酸素療法（区分2）の境界は施設で定義を統一すること</li>
      </ul>
    `,
    noteTemplate: "疾患・状態 医療区分：　区分（主な根拠：　　　　）\n処置等 医療区分：　　区分（主な根拠：　　　　）\nADL区分：　　区分（スコア：　　）\n評価日：",
    sourceTitle: "令和6年度診療報酬改定 療養病棟入院基本料 施設基準（厚生労働省）",
    sourceFile: "pdf/iryo_kubun_hyoka.pdf",
    sourcePages: "要確認（別紙8 評価票）",
    updatedAt: "2026-04-06（令和6年度改定内容を反映）",
  },

  // ============================================================
  //  2. 障害高齢者の日常生活自立度
  //  出典: 「障害老人の日常生活自立度（寝たきり度）判定基準」
  //        厚生省老健局長通知 老健第102-2号（平成3年11月18日）
  //  参考: https://www.tyojyu.or.jp/net/kaigo-seido/kaigo-hoken/shougai-jiritsu.html
  //        https://www.mhlw.go.jp/file/06-Seisakujouhou-12300000-Roukenkyoku/0000077382.pdf
  // ============================================================
  {
    id: "shougai_jiritsu",
    title: "障害高齢者の日常生活自立度",
    shortLabel: "寝たきり度の判定（ランクJ〜C2）",
    keywords: ["日常生活自立度", "寝たきり度", "ランクJ", "ランクA", "ランクB", "ランクC", "ADL"],
    summary: `
      <table class="detail-table">
        <thead><tr><th style="width:4em">ランク</th><th>状態の目安</th><th>移動・生活の状況</th></tr></thead>
        <tbody>
          <tr><td><strong>J1</strong></td><td>生活自立</td><td>交通機関を使って外出できる</td></tr>
          <tr><td><strong>J2</strong></td><td>生活自立</td><td>隣近所程度なら外出できる</td></tr>
          <tr><td><strong>A1</strong></td><td>準寝たきり</td><td>介助で外出。日中はほぼベッドを離れて生活</td></tr>
          <tr><td><strong>A2</strong></td><td>準寝たきり</td><td>外出ほぼなし。日中も寝起きを繰り返す</td></tr>
          <tr><td><strong>B1</strong></td><td>寝たきり（座位可）</td><td><strong>自力で</strong>車いす移乗。食事・排泄はベッド外</td></tr>
          <tr><td><strong>B2</strong></td><td>寝たきり（座位可）</td><td><strong>介助で</strong>車いす移乗。食事・排泄にも介助要</td></tr>
          <tr><td><strong>C1</strong></td><td>寝たきり（重度）</td><td>1日中ベッド。自力で<strong>寝返りできる</strong></td></tr>
          <tr><td><strong>C2</strong></td><td>寝たきり（最重度）</td><td>1日中ベッド。自力での<strong>寝返り不可</strong></td></tr>
        </tbody>
      </table>
    `,
    trickyPoints: `
      <ul>
        <li><strong>B1とB2の分かれ目</strong>：「自力で車いすに移乗できるか」。介助が必要→B2</li>
        <li><strong>C1とC2の分かれ目</strong>：「自力で寝返りができるか」。できない→C2</li>
        <li>認知症があっても身体的に外出できればJ判定もあり得る（認知症自立度と<strong>別軸</strong>で評価）</li>
        <li>「現在の状態」で評価。「本来できるはず」という潜在能力で評価しない</li>
        <li>介護保険の認定調査でも同一基準を使うが、医療機関での使用目的（診療報酬）とは異なる</li>
        <li>同じ患者でも評価者によりブレが生じやすい（施設内で判定基準を統一しておく）</li>
      </ul>
    `,
    noteTemplate: "寝たきり度：ランク（　　）\n評価日：\n評価者：\n主な根拠（移動・外出状況など）：",
    sourceTitle: "障害老人の日常生活自立度（寝たきり度）判定基準（厚生省老健局長通知、平成3年）",
    sourceFile: "pdf/shougai_jiritsu.pdf",
    sourcePages: "全1ページ（厚生省老健局長通知別紙）",
    updatedAt: "2026-04-06（制定1991年・基準改訂なし）",
  },

  // ============================================================
  //  3. 認知症高齢者の日常生活自立度
  //  出典: 「認知症高齢者の日常生活自立度判定基準」
  //        厚生省老健局長通知（平成5年）
  //  参考: https://www.tyojyu.or.jp/net/kaigo-seido/kaigo-hoken/ninchi-jiritsu.html
  //        https://www.mhlw.go.jp/topics/2013/02/dl/tp0215-11-11d.pdf
  // ============================================================
  {
    id: "ninchisho_jiritsu",
    title: "認知症高齢者の日常生活自立度",
    shortLabel: "認知症の生活自立度判定（ランクⅠ〜M）",
    keywords: ["認知症", "日常生活自立度", "ランクI", "ランクII", "ランクIII", "ランクIV", "ランクM", "BPSD", "徘徊", "失禁"],

// ============================================================
//  UIレンダリング
// ============================================================

function buildPdfLink(item) {
  if (item.sourceFile) {
    // file:// の場合は target="_blank" だと iOS Safari でブロックされる場合があるため同タブで開く
    const target = location.protocol === 'file:' ? '' : ' target="_blank" rel="noopener"';
    return `<a class="pdf-btn" href="${item.sourceFile}"${target}>公式PDFを開く（${item.sourceTitle}）</a>`;
  }
  return `<span class="pdf-btn pdf-btn-disabled">PDFファイル未設定（pdf/フォルダに配置後 sourceFile を更新）</span>`;
}

function renderItem(item) {
  const card = document.createElement("div");
  card.className = "item-card";
  card.dataset.id = item.id;
  card.dataset.search = [item.title, ...(item.keywords || [])].join(" ").toLowerCase();

  card.innerHTML = `
    <details>
      <summary>
        <span class="summary-icon">▶</span>
        <span class="summary-text">
          <span class="summary-title">${item.title}</span>
          <span class="summary-label">${item.shortLabel}</span>
        </span>
      </summary>
      <div class="detail-body">

        <div class="section" style="margin-top:10px">
          ${item.summary}
        </div>

        <div class="section">
          <p class="section-title">迷いやすいポイント</p>
          ${item.trickyPoints}
        </div>

        <div class="section">
          <p class="section-title">記載メモ（テンプレート）</p>
          <pre style="font-size:13px; white-space:pre-wrap; color:var(--text-sub); background:var(--bg); border:1px solid var(--border); border-radius:6px; padding:10px;">${item.noteTemplate}</pre>
        </div>

        <div class="section">
          <p class="section-title">出典</p>
          <dl class="source-box">
            <dt>資料名</dt>
            <dd>${item.sourceTitle}</dd>
            <dt>該当ページ</dt>
            <dd>${item.sourcePages}</dd>
          </dl>
          ${buildPdfLink(item)}
        </div>

        <p class="updated-at">更新日: ${item.updatedAt}</p>

      </div>
    </details>
  `;
  return card;
}

const listEl = document.getElementById("item-list");
const emptyEl = document.getElementById("empty-msg");

// 全項目を一度描画
ITEMS.forEach(item => listEl.appendChild(renderItem(item)));

// ============================================================
//  検索
// ============================================================
document.getElementById("search").addEventListener("input", function () {
  const q = this.value.trim().toLowerCase();
  let visible = 0;
  document.querySelectorAll(".item-card").forEach(card => {
    const hit = !q || card.dataset.search.includes(q);
    card.hidden = !hit;
    if (hit) visible++;
  });
  emptyEl.hidden = visible > 0;
});

// ============================================================
//  PWA: Service Worker 登録 + インストールバナー
// ============================================================

(function () {
  // file:// で開いている場合はサーバー不要・サービスワーカー不要なのでスキップ
  if (location.protocol === 'file:') return;

  // すでにホーム画面から起動している場合はバナー不要
  const isStandalone =
    window.matchMedia('(display-mode: standalone)').matches ||
    window.navigator.standalone === true;
  if (isStandalone || localStorage.getItem('install-dismissed')) return;

  const banner   = document.getElementById('install-banner');
  const swStatus = document.getElementById('sw-status');
  const urlEl    = document.getElementById('ib-url');
  const iosEl    = document.getElementById('ib-ios');
  const androidEl= document.getElementById('ib-android');
  const installBtn = document.getElementById('install-btn');

  // バナーを表示
  banner.hidden = false;

  // アクセス中のURLを表示（スマホ側で入力する参考用）
  urlEl.textContent = window.location.origin + window.location.pathname.replace(/\/[^/]*$/, '/');

  // OS判定
  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  if (isIOS) {
    iosEl.hidden = false;
  } else {
    androidEl.hidden = false;
  }

  // 閉じるボタン
  document.getElementById('install-close').addEventListener('click', () => {
    localStorage.setItem('install-dismissed', '1');
    banner.hidden = true;
  });

  // Android Chrome: インストールプロンプトをキャッチ
  let deferredPrompt = null;
  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredPrompt = e;
    installBtn.hidden = false;
    androidEl.hidden = true; // 手動手順は不要になるので隠す
  });
  installBtn.addEventListener('click', async () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    deferredPrompt = null;
    if (outcome === 'accepted') {
      localStorage.setItem('install-dismissed', '1');
      banner.hidden = true;
    }
  });

  // Service Worker 登録
  if (!('serviceWorker' in navigator)) {
    swStatus.textContent = '⚠️ このブラウザはオフライン機能に対応していません';
    return;
  }

  // まず現在のコントローラーを確認（再読み込み時など SW がすでに動いている場合）
  if (navigator.serviceWorker.controller) {
    swStatus.textContent = '✅ オフライン利用可能（PDFも含む）';
  }

  // SW を登録し、ready（active 状態になった時点）で確定表示
  // navigator.serviceWorker.ready は SW が activated になると必ず resolve する
  navigator.serviceWorker.register('./sw.js')
    .then(() => navigator.serviceWorker.ready)
    .then(() => {
      swStatus.textContent = '✅ オフライン利用可能（PDFも含む）';
    })
    .catch(() => {
      swStatus.textContent = '⚠️ オフライン機能の設定に失敗（HTTP経由でのアクセスが必要です）';
    });
}());
</script>
