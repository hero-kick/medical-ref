<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>医療参照ツール</title>
  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1a6b9a">
  <!-- iOS ホーム画面追加サポート -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="医療参照">
  <link rel="apple-touch-icon" href="icon.svg">
  <style>
    /* ===== リセット・基本 ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f5f5;
      --surface: #ffffff;
      --border: #d0d0d0;
      --text: #1a1a1a;
      --text-sub: #555;
      --accent: #1a6b9a;
      --accent-bg: #eaf3fa;
      --warn: #7a4400;
      --warn-bg: #fff5e0;
      --tag-bg: #e8e8e8;
      --radius: 10px;
      --shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    /* OS設定がダークかつ手動でライト指定していない場合 */
    @media (prefers-color-scheme: dark) {
      :root:not([data-theme="light"]) {
        --bg: #121212;
        --surface: #1e1e1e;
        --border: #333;
        --text: #e8e8e8;
        --text-sub: #aaa;
        --accent: #5aabdb;
        --accent-bg: #1a2f3d;
        --warn: #f0c060;
        --warn-bg: #2a1e00;
        --tag-bg: #2a2a2a;
        --shadow: 0 1px 4px rgba(0,0,0,0.4);
      }
    }
    /* 手動でダーク指定した場合（OS設定に関わらず適用） */
    :root[data-theme="dark"] {
      --bg: #121212;
      --surface: #1e1e1e;
      --border: #333;
      --text: #e8e8e8;
      --text-sub: #aaa;
      --accent: #5aabdb;
      --accent-bg: #1a2f3d;
      --warn: #f0c060;
      --warn-bg: #2a1e00;
      --tag-bg: #2a2a2a;
      --shadow: 0 1px 4px rgba(0,0,0,0.4);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      font-size: 16px;
      line-height: 1.6;
      max-width: 680px;
      margin: 0 auto;
      padding: 0 0 40px;
    }

    /* ===== ヘッダー ===== */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 16px 12px;
      position: sticky;
      top: 0;
      z-index: 10;
      box-shadow: var(--shadow);
    }
    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 10px;
    }
    header h1 {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }
    header h1 span {
      font-size: 12px;
      font-weight: 400;
      color: var(--text-sub);
      margin-left: 8px;
    }
    #theme-toggle {
      flex-shrink: 0;
      width: 36px;
      height: 32px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg);
      color: var(--text);
      font-size: 15px;
      line-height: 1;
      cursor: pointer;
    }
    .search-row { position: relative; }
    #search {
      width: 100%;
      padding: 10px 38px 10px 14px;
      font-size: 16px; /* 16px以上でiOSズームを防ぐ */
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg);
      color: var(--text);
      outline: none;
      appearance: none;
    }
    #search:focus { border-color: var(--accent); }
    #search::-webkit-search-cancel-button { display: none; }
    #search-clear {
      position: absolute;
      right: 4px;
      top: 50%;
      transform: translateY(-50%);
      border: none;
      background: none;
      color: var(--text-sub);
      font-size: 16px;
      padding: 8px 10px;
      cursor: pointer;
      line-height: 1;
    }

    /* カテゴリチップ */
    #cat-chips {
      display: flex;
      gap: 6px;
      margin-top: 8px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    #cat-chips::-webkit-scrollbar { display: none; }
    .chip {
      flex-shrink: 0;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text-sub);
      border-radius: 999px;
      padding: 4px 12px;
      font-size: 12px;
      font-family: inherit;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .chip.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      font-weight: 700;
    }

    /* ツールバー（件数・一括開閉） */
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 8px;
    }
    #hit-count { font-size: 12px; color: var(--text-sub); }
    #toggle-all {
      border: none;
      background: none;
      color: var(--accent);
      font-size: 12px;
      font-weight: 700;
      font-family: inherit;
      padding: 2px 4px;
      cursor: pointer;
    }

    /* ===== 項目カード ===== */
    #item-list {
      padding: 12px 12px 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .item-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .item-card[hidden] { display: none; }

    /* <details>/<summary> で折りたたみ */
    details summary {
      list-style: none;
      cursor: pointer;
      padding: 16px;
      user-select: none;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      -webkit-tap-highlight-color: transparent;
    }
    details summary::-webkit-details-marker { display: none; }
    .summary-icon {
      flex-shrink: 0;
      width: 28px;
      height: 28px;
      border: 1px solid var(--border);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      color: var(--text-sub);
      transition: transform 0.2s;
    }
    details[open] .summary-icon { transform: rotate(90deg); }
    .summary-text { flex: 1; }
    .summary-title {
      font-size: 16px;
      font-weight: 700;
      display: block;
      margin-bottom: 2px;
    }
    .summary-label {
      font-size: 13px;
      color: var(--text-sub);
    }

    /* ===== 詳細コンテンツ ===== */
    .detail-body {
      padding: 0 16px 16px;
      border-top: 1px solid var(--border);
    }
    .section {
      margin-top: 14px;
    }
    .section-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-sub);
      margin-bottom: 6px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 4px;
    }
    .section p,
    .section li {
      font-size: 14px;
      line-height: 1.65;
    }
    .section ul, .section ol {
      padding-left: 18px;
    }
    .section li + li { margin-top: 3px; }

    /* 表 */
    .detail-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      margin-top: 4px;
    }
    .detail-table th,
    .detail-table td {
      border: 1px solid var(--border);
      padding: 6px 8px;
      text-align: left;
      vertical-align: top;
    }
    .detail-table thead th {
      background: var(--tag-bg);
      font-weight: 700;
    }
    .detail-table tr:nth-child(even) td { background: var(--bg); }

    /* 注意・警告ボックス */
    .warn-box {
      background: var(--warn-bg);
      border-left: 3px solid var(--warn);
      padding: 8px 12px;
      border-radius: 0 6px 6px 0;
      font-size: 13px;
      color: var(--warn);
      margin-top: 6px;
    }

    /* TODO バッジ */
    .badge-todo {
      display: inline-block;
      background: var(--warn-bg);
      color: var(--warn);
      border: 1px solid var(--warn);
      border-radius: 4px;
      font-size: 11px;
      padding: 1px 6px;
      margin-left: 6px;
      vertical-align: middle;
      font-weight: 700;
    }

    /* 出典 */
    .source-box {
      background: var(--accent-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 12px;
      font-size: 13px;
      margin-top: 6px;
    }
    .source-box dt {
      font-weight: 700;
      color: var(--text-sub);
      font-size: 11px;
      letter-spacing: 0.06em;
      margin-top: 6px;
    }
    .source-box dt:first-child { margin-top: 0; }
    .source-box dd { margin-left: 0; color: var(--text); }

    /* PDFボタン */
    .pdf-btn {
      display: block;
      width: 100%;
      margin-top: 14px;
      padding: 13px;
      background: var(--accent);
      color: #fff;
      text-align: center;
      border-radius: 8px;
      text-decoration: none;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.02em;
      border: none;
      cursor: pointer;
      font-family: inherit;
    }
    .pdf-btn:hover { opacity: 0.9; }
    .pdf-btn-disabled {
      background: var(--tag-bg);
      color: var(--text-sub);
      cursor: default;
    }

    /* 更新日 */
    .updated-at {
      font-size: 12px;
      color: var(--text-sub);
      text-align: right;
      margin-top: 10px;
    }


    /* 免責 */
    #disclaimer {
      margin: 16px 12px 0;
      padding: 10px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 12px;
      color: var(--text-sub);
      line-height: 1.6;
    }

    /* 空状態 */
    #empty-msg {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-sub);
      font-size: 15px;
    }

    /* ピン留め */
    .pin-btn {
      flex-shrink: 0;
      border: none;
      background: none;
      font-size: 18px;
      line-height: 1;
      color: var(--border);
      padding: 4px 6px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .item-card.pinned { border-color: var(--accent); }
    .item-card.pinned .pin-btn { color: var(--accent); }

    /* メモコピー */
    .copy-btn {
      float: right;
      border: 1px solid var(--accent);
      background: none;
      color: var(--accent);
      border-radius: 5px;
      font-size: 11px;
      font-weight: 700;
      font-family: inherit;
      padding: 2px 10px;
      cursor: pointer;
    }
    .copy-btn:disabled { opacity: 0.7; cursor: default; }

    /* 先頭へ戻る */
    #back-to-top {
      position: fixed;
      right: 16px;
      bottom: 20px;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--accent);
      font-size: 20px;
      line-height: 1;
      box-shadow: var(--shadow);
      cursor: pointer;
      z-index: 20;
    }
  </style>
</head>
<body>

<header>
  <div class="header-top">
    <h1>医療参照ツール <span>療養型病院 日常確認用</span></h1>
    <button id="theme-toggle" type="button" aria-label="ダーク/ライト切替">🌙</button>
  </div>
  <div class="search-row">
    <input type="search" id="search" placeholder="キーワードで検索（スペース区切りでAND）" autocomplete="off">
    <button id="search-clear" type="button" aria-label="検索をクリア" hidden>✕</button>
  </div>
  <div id="cat-chips" role="group" aria-label="カテゴリで絞り込み"></div>
  <div class="toolbar">
    <span id="hit-count"></span>
    <button id="toggle-all" type="button">すべて開く</button>
  </div>
</header>


<p id="disclaimer">
  このツールは個人用の参照補助です。診療・ケアの判断は必ず最新の公式資料・施設基準・主治医の指示に従ってください。
</p>

<div id="item-list"></div>
<p id="empty-msg" hidden>該当する項目がありません</p>

<button id="back-to-top" type="button" aria-label="先頭へ戻る" hidden>↑</button>

<script>
// ============================================================
//  データ定義
//  1項目を追加するには、ITEMS 配列の末尾に以下テンプレートを
//  コピーして値を埋めてください。HTMLは変更不要です。
// ============================================================

/*
  --- 項目追加テンプレート ---
  {
    id: "unique_id",              // 重複しない英数字ID
    title: "項目名",
    category: "制度・区分",         // 絞り込みチップに使うカテゴリ（既存: 制度・区分 / 薬剤 / 書類 / 身体所見）
    shortLabel: "一言説明",
    keywords: ["検索", "キーワード"],   // 検索に使うタグ
    summary: `
      <p>ここに要約を書く（HTML使用可）</p>
    `,
    trickyPoints: `
      <ul>
        <li>迷いやすいポイント1</li>
      </ul>
    `,
    noteTemplate: "記録メモ欄テンプレート文字列",
    sourceTitle: "出典資料名",
    sourceFile: "pdf/filename.pdf",  // pdf/フォルダに置いたファイル名
    sourcePages: "p.1〜5",
    updatedAt: "2024-xx-xx",
  },
*/

const ITEMS = [

  // ============================================================
  //  1. 医療区分
  //  出典: 令和6年度診療報酬改定 療養病棟入院基本料 施設基準（厚生労働省）
  //  参考: https://www.pt-ot-st.net/contents4/medical-treatment-reiwa-6/department/2277
  // ============================================================
  {
    id: "iryo_kubun",
    title: "医療区分",
    category: "制度・区分",
    shortLabel: "療養病棟の入院基本料算定区分（令和6年改定・30分類）",
    keywords: ["医療区分", "療養病棟", "入院基本料", "ADL区分", "令和6年", "中心静脈栄養", "経腸栄養"],
    summary: `
      <p style="font-size:12px; color:var(--text-sub); margin-bottom:6px">令和6年改定：疾患・状態／処置等／ADL の3軸で評価（計30分類）</p>

      <p style="font-weight:700; margin-bottom:4px">疾患・状態</p>
      <table class="detail-table">
        <thead><tr><th style="width:4em">区分</th><th>該当する疾患・状態（代表例）</th></tr></thead>
        <tbody>
          <tr>
            <td><strong>3</strong></td>
            <td>スモン／<strong>常時監視・管理</strong>が必要な状態</td>
          </tr>
          <tr>
            <td><strong>2</strong></td>
            <td>
              筋ジストロフィー症・多発性硬化症・ALS<br>
              パーキンソン病関連疾患（ホーエン・ヤールStage<u>3</u>以上かつ生活機能障害度<u>Ⅱ/Ⅲ度</u>）<br>
              その他の指定難病（特定疾患治療研究事業の疾患）<br>
              頸椎損傷による四肢麻痺<br>
              COPD（ヒュー・ジョーンズ<u>Ⅴ度</u>）<br>
              透析（人工腎臓・持続緩徐式血液濾過・腹膜灌流・血漿交換）<br>
              消化管出血・出血性膀胱炎の反復継続状態<br>
              悪性腫瘍（医療用麻薬等の<strong>疼痛コントロール</strong>が必要な場合）
            </td>
          </tr>
          <tr><td><strong>1</strong></td><td>上記以外</td></tr>
        </tbody>
      </table>

      <p style="font-weight:700; margin:10px 0 4px">処置等</p>
      <table class="detail-table">
        <thead><tr><th style="width:4em">区分</th><th>該当する処置（代表例）</th></tr></thead>
        <tbody>
          <tr>
            <td><strong>3</strong></td>
            <td>
              24時間持続点滴（経口摂取困難・循環動態不安定等、<u>7日間限定</u>）<br>
              中心静脈栄養（対象疾患あり <em>または</em> 開始<u>30日以内</u>）<br>
              人工呼吸器（使用中）<br>
              気管切開・挿管（体温<u>38.0℃以上</u>の発熱あり）<br>
              ドレーン・胸腹腔洗浄<br>
              感染症による隔離室管理<br>
              酸素療法（酸素非投与下でSpO₂<u>90%以下</u>の状態）
            </td>
          </tr>
          <tr>
            <td><strong>2</strong></td>
            <td>
              中心静脈栄養（対象疾患なし・開始<u>30日超</u>）<span style="color:var(--warn)">←R6改定で3→2</span><br>
              気管切開・挿管（発熱なし）<br>
              脱水＋発熱への治療（<u>7日限</u>）<br>
              肺炎・尿路感染症への抗菌薬投与<br>
              褥瘡（第<u>2</u>度以上または<u>2か所</u>以上）<br>
              創傷・皮膚潰瘍・蜂巣炎等（1日<u>2回以上</u>のガーゼや創傷被覆材の交換が必要）<br>
              経腸栄養（発熱・嘔吐伴う、<u>7日限</u>）<br>
              喀痰吸引（1日<u>8回</u>以上）<br>
              せん妄への治療（<u>7日限</u>）・頻回血糖検査（1日<u>3回</u>以上、<u>3日限</u>）<br>
              酸素療法（SpO₂ 90%以下の状態を除く）<br>
              リハビリテーション（発症<u>30日以内</u>）
            </td>
          </tr>
          <tr><td><strong>1</strong></td><td>上記以外</td></tr>
        </tbody>
      </table>

      <p style="font-weight:700; margin:10px 0 4px">ADL区分</p>
      <table class="detail-table">
        <thead><tr><th style="width:4em">区分</th><th>合計スコア（0〜24点）</th></tr></thead>
        <tbody>
          <tr><td><strong>3</strong></td><td>23〜24点（ほぼ全介助）</td></tr>
          <tr><td><strong>2</strong></td><td>11〜22点（中程度介助）</td></tr>
          <tr><td><strong>1</strong></td><td>0〜10点（比較的自立）</td></tr>
        </tbody>
      </table>
      <p style="font-size:12px; margin-top:6px; color:var(--text-sub)">4項目（ベッド上可動性・移乗・食事・トイレ使用）× 0〜6点（0=自立、6=全介助）＝最大24点。<strong>高スコア＝より要介護</strong></p>
      <p style="font-size:13px; margin-top:6px; color:var(--text-sub)">新設：経腸栄養管理加算 300点/日（7日限度）</p>
    `,
    trickyPoints: `
      <ul>
        <li><strong>中心静脈栄養の区分が変わった（令和6年改定）</strong>：対象疾患がある場合または開始30日以内→区分3、それ以外の長期継続→区分2</li>
        <li>「疾患・状態」と「処置等」は<strong>別々に評価</strong>し、組み合わせで30分類のいずれかに決まる</li>
        <li>ADL区分は別紙8を用いて<strong>毎日</strong>評価・記録する。<strong>スコアが高い＝より全介助</strong>（区分3=23〜24点、区分1=0〜10点）。当日含む過去3日間の平均的な状態で判定</li>
        <li><strong>気管切開・挿管は発熱の有無で区分が変わる</strong>：38.0℃以上の発熱あり→区分3、発熱なし→区分2。人工呼吸器は発熱に関係なく区分3</li>
        <li><strong>酸素療法（区分3）の基準</strong>：酸素非投与下で安静時・睡眠時・運動負荷のいずれかでSpO₂が90%以下となる状態。毎月末に該当状態か確認し診療録に記録が必要</li>
        <li><strong>褥瘡（区分2）の条件</strong>：第2度以上（皮膚層の部分的喪失）または2か所以上に認められる場合。入院時既発生の褥瘡は治癒・軽快後も30日間は区分2として取り扱い可</li>
        <li><strong>創傷・皮膚潰瘍・蜂巣炎等（区分2）の条件</strong>：1日2回以上のガーゼや創傷被覆材の交換が必要な場合に限る（褥瘡とは別項目）</li>

          <tr><td rowspan="4"><strong>E</strong> 開眼<br><span style="font-size:11px; color:var(--text-sub)">eye opening</span></td><td>4</td><td>自発的に開眼</td></tr>
          <tr><td>3</td><td>呼びかけにより開眼</td></tr>
          <tr><td>2</td><td>痛み刺激により開眼</td></tr>
          <tr><td>1</td><td>開眼しない</td></tr>
          <tr><td rowspan="5"><strong>V</strong> 言語<br><span style="font-size:11px; color:var(--text-sub)">verbal response</span></td><td>5</td><td>見当識あり（正常な会話）</td></tr>
          <tr><td>4</td><td>会話混乱（見当識障害）</td></tr>
          <tr><td>3</td><td>不適当な単語のみ</td></tr>
          <tr><td>2</td><td>意味不明の発声のみ</td></tr>
          <tr><td>1</td><td>発語なし（挿管中は <strong>T</strong> と記載）</td></tr>
          <tr><td rowspan="6"><strong>M</strong> 運動<br><span style="font-size:11px; color:var(--text-sub)">motor response</span></td><td>6</td><td>命令に従う</td></tr>
          <tr><td>5</td><td>痛み刺激の部位に手を持っていく（払いのける）</td></tr>
          <tr><td>4</td><td>痛みから逃避する（引っ込める）</td></tr>
          <tr><td>3</td><td>異常屈曲（除皮質硬直）</td></tr>
          <tr><td>2</td><td>異常伸展（除脳硬直）</td></tr>
          <tr><td>1</td><td>まったく動かない</td></tr>
        </tbody>
      </table>
      <p style="font-size:12px; color:var(--text-sub); margin-top:4px">記載例：GCS 14（E4V4M6）。合計点だけでなく E・V・M の内訳も必ず残す。</p>
    `,
    trickyPoints: `
      <ul>
        <li><strong>JCS は「覚醒しているか」だけで大分類</strong>：開眼していても、呼びかけをやめると眠り込むなら II 桁</li>
        <li><strong>意識清明は「JCS 0」「GCS 15」</strong>：清明なら 0 と記載する（I-1 ではない）</li>
        <li><strong>重症の目安</strong>：<span style="color:var(--warn)">GCS 8点以下・JCS 30以上（II-30〜）は重症意識障害</span>＝気道確保を検討するライン</li>
        <li><strong>認知症・失語では V を単独で評価しない</strong>：普段のベースラインとの比較で判断し、記録にベースラインも残す</li>
        <li><strong>「眠っているだけ」との区別</strong>：呼びかけで速やかに完全覚醒し、覚醒が維持されるなら意識障害ではない</li>
        <li><strong>急な意識レベル低下は、まずバイタル＋血糖</strong>：低血糖・低酸素・ショック・薬剤性（ベンゾ・オピオイド等）を先に除外する</li>
        <li><strong>点数そのものより経時変化が重要</strong>：「JCS 3 → 20 に低下」のような推移で報告する</li>
      </ul>
    `,
    noteTemplate: "評価日時：\nJCS：　　（付加記号 R/I/A、例 JCS 20、JCS 30R）\nGCS：E　 V　 M　 ＝合計　　点（挿管中は VT）\n普段のベースライン：\n瞳孔径：右　mm / 左　mm　　対光反射：右　/ 左\nバイタル：BP　/　　HR　　SpO2　％　RR　/分　BT　　℃　血糖　　mg/dL\n変化の契機（薬剤変更・発熱・転倒など）：\n対応・報告先：",
    sourceTitle: "標準的評価スケール（JCS 3-3-9度方式 / Glasgow Coma Scale）",
    sourceFile: "",
    sourcePages: "—",
    updatedAt: "2026-07-07（初版）",
  },

]; // ITEMS 配列ここまで

// ============================================================
//  UIレンダリング
// ============================================================

function buildPdfLink(item) {
  if (item.sourceFile) {
    // window.open はユーザー操作起点のため iOS Safari (file://) でも新規タブで開ける
    const url = item.sourceFile.replace(/'/g, '%27');
    return `<button class="pdf-btn" type="button" onclick="window.open('${url}', '_blank', 'noopener')">公式PDFを開く（${item.sourceTitle}）</button>`;
  }
  return `<span class="pdf-btn pdf-btn-disabled">PDFファイル未設定（pdf/フォルダに配置後 sourceFile を更新）</span>`;
}

// ============================================================
//  永続化ヘルパー（file:// 等で localStorage が使えなくても動作継続）
// ============================================================
function storeGet(key) {
  try { return localStorage.getItem(key); } catch (e) { return null; }
}
function storeSet(key, value) {
  try { localStorage.setItem(key, value); } catch (e) {}
}

// ============================================================
//  ピン留め（よく使う項目を先頭に固定）
// ============================================================
let pins = [];
try { pins = JSON.parse(storeGet("medref-pins")) || []; } catch (e) { pins = []; }

function togglePin(id) {
  const i = pins.indexOf(id);
  if (i >= 0) pins.splice(i, 1); else pins.push(id);
  storeSet("medref-pins", JSON.stringify(pins));
  applyPinOrder();
}

const itemOrder = {};
ITEMS.forEach((item, i) => { itemOrder[item.id] = i; });

function applyPinOrder() {
  const cards = Array.from(listEl.children);
  cards.sort((a, b) => {
    const pa = pins.includes(a.dataset.id) ? 0 : 1;
    const pb = pins.includes(b.dataset.id) ? 0 : 1;
    if (pa !== pb) return pa - pb;
    return itemOrder[a.dataset.id] - itemOrder[b.dataset.id];
  });
  cards.forEach(card => {
    const pinned = pins.includes(card.dataset.id);
    card.classList.toggle("pinned", pinned);
    card.querySelector(".pin-btn").setAttribute("aria-pressed", pinned ? "true" : "false");
    listEl.appendChild(card);
  });
}

// ============================================================
//  記載メモのコピー（非セキュアコンテキスト用フォールバック付き）
// ============================================================
function fallbackCopy(text) {
  const ta = document.createElement("textarea");
  ta.value = text;
  ta.style.position = "fixed";
  ta.style.opacity = "0";
  document.body.appendChild(ta);
  ta.select();
  let ok = false;
  try { ok = document.execCommand("copy"); } catch (e) {}
  document.body.removeChild(ta);
  return ok;
}

function copyText(text, btn) {
  const done = ok => {
    btn.textContent = ok ? "コピーしました" : "コピー失敗";
    btn.disabled = true;
    setTimeout(() => { btn.textContent = "コピー"; btn.disabled = false; }, 1500);
  };
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(text).then(() => done(true), () => done(fallbackCopy(text)));
  } else {
    done(fallbackCopy(text));
  }
}

function renderItem(item) {
  const card = document.createElement("div");
  card.className = "item-card";
  card.dataset.id = item.id;
  card.dataset.category = item.category || "";
  // 検索対象: タイトル・サブタイトル・キーワードに加え、本文（HTMLタグ除去）とメモも含める
  const tmp = document.createElement("div");
  tmp.innerHTML = (item.summary || "") + (item.trickyPoints || "");
  card.dataset.search = [
    item.title,
    item.shortLabel,
    ...(item.keywords || []),
    tmp.textContent,
    item.noteTemplate,
    item.sourceTitle,
  ].join(" ").toLowerCase().replace(/\s+/g, " ");

  card.innerHTML = `
    <details>
      <summary>
        <span class="summary-icon">▶</span>
        <span class="summary-text">
          <span class="summary-title">${item.title}</span>
          <span class="summary-label">${item.shortLabel}</span>
        </span>
        <button class="pin-btn" type="button" aria-label="よく使う項目として先頭に固定" aria-pressed="false">★</button>
      </summary>
      <div class="detail-body">

        <div class="section" style="margin-top:10px">
          ${item.summary}
        </div>

        <div class="section">
          <p class="section-title">迷いやすいポイント</p>
          ${item.trickyPoints}
        </div>

        <div class="section">
          <p class="section-title">記載メモ（テンプレート）<button class="copy-btn" type="button">コピー</button></p>
          <pre style="font-size:13px; white-space:pre-wrap; color:var(--text-sub); background:var(--bg); border:1px solid var(--border); border-radius:6px; padding:10px;">${item.noteTemplate}</pre>
        </div>

        <div class="section">
          <p class="section-title">出典</p>
          <dl class="source-box">
            <dt>資料名</dt>
            <dd>${item.sourceTitle}</dd>
            <dt>該当ページ</dt>
            <dd>${item.sourcePages}</dd>
          </dl>
          ${buildPdfLink(item)}
        </div>

        <p class="updated-at">更新日: ${item.updatedAt}</p>

      </div>
    </details>
  `;

  // ピン留め（summary 内のボタンなので、details の開閉に伝播させない）
  card.querySelector(".pin-btn").addEventListener("click", e => {
    e.preventDefault();
    e.stopPropagation();
    togglePin(item.id);
  });

  // 記載メモのコピー
  card.querySelector(".copy-btn").addEventListener("click", e => {
    copyText(item.noteTemplate, e.currentTarget);
  });

  return card;
}

const listEl = document.getElementById("item-list");
const emptyEl = document.getElementById("empty-msg");

// 全項目を一度描画し、ピン留め順を反映
ITEMS.forEach(item => listEl.appendChild(renderItem(item)));
applyPinOrder();

// ============================================================
//  検索（スペース区切り AND）＋ カテゴリ絞り込み
// ============================================================
const searchEl = document.getElementById("search");
const searchClearEl = document.getElementById("search-clear");
const hitCountEl = document.getElementById("hit-count");
let activeCategory = "";

function applyFilter() {
  const terms = searchEl.value.trim().toLowerCase().split(/[\s　]+/).filter(Boolean);
  let visible = 0;
  document.querySelectorAll(".item-card").forEach(card => {
    const inCategory = !activeCategory || card.dataset.category === activeCategory;
    const hit = inCategory && terms.every(t => card.dataset.search.includes(t));
    card.hidden = !hit;
    if (hit) visible++;
  });
  emptyEl.hidden = visible > 0;
  hitCountEl.textContent = `${visible}件`;
  searchClearEl.hidden = !searchEl.value;
}

searchEl.addEventListener("input", applyFilter);
searchClearEl.addEventListener("click", () => {
  searchEl.value = "";
  applyFilter();
  searchEl.focus();
});

// カテゴリチップを ITEMS から動的生成
const chipsEl = document.getElementById("cat-chips");
const categories = [];
ITEMS.forEach(item => {
  if (item.category && !categories.includes(item.category)) categories.push(item.category);
});
["", ...categories].forEach(cat => {
  const chip = document.createElement("button");
  chip.type = "button";
  chip.className = "chip" + (cat === "" ? " active" : "");
  chip.textContent = cat === "" ? "すべて" : cat;
  chip.addEventListener("click", () => {
    activeCategory = cat;
    chipsEl.querySelectorAll(".chip").forEach(c => c.classList.toggle("active", c === chip));
    applyFilter();
  });
  chipsEl.appendChild(chip);
});

applyFilter();

// ============================================================
//  すべて開く / 閉じる（表示中のカードのみ対象）
// ============================================================
const toggleAllEl = document.getElementById("toggle-all");
toggleAllEl.addEventListener("click", () => {
  const detailsList = Array.from(document.querySelectorAll(".item-card:not([hidden]) details"));
  const shouldOpen = detailsList.some(d => !d.open);
  detailsList.forEach(d => { d.open = shouldOpen; });
  toggleAllEl.textContent = shouldOpen ? "すべて閉じる" : "すべて開く";
});

// ============================================================
//  先頭へ戻るボタン
// ============================================================
const backToTopEl = document.getElementById("back-to-top");
window.addEventListener("scroll", () => {
  backToTopEl.hidden = window.scrollY < 400;
}, { passive: true });
backToTopEl.addEventListener("click", () => {
  window.scrollTo({ top: 0, behavior: "smooth" });
});

// ============================================================
//  テーマ切替（未設定時は OS 設定に追従、手動切替を localStorage に保存）
// ============================================================
const themeToggleEl = document.getElementById("theme-toggle");

function reflectThemeButton() {
  const dark = document.documentElement.dataset.theme === "dark" ||
    (!document.documentElement.dataset.theme &&
      window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches);
  themeToggleEl.textContent = dark ? "☀️" : "🌙";
}

const savedTheme = storeGet("medref-theme");
if (savedTheme === "light" || savedTheme === "dark") {
  document.documentElement.dataset.theme = savedTheme;
}
reflectThemeButton();

themeToggleEl.addEventListener("click", () => {
  const nowDark = document.documentElement.dataset.theme === "dark" ||
    (!document.documentElement.dataset.theme &&
      window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches);
  const next = nowDark ? "light" : "dark";
  document.documentElement.dataset.theme = next;
  storeSet("medref-theme", next);
  reflectThemeButton();
});

// ============================================================
//  PWA: Service Worker 登録（サイレント）
// ============================================================

(function () {
  if (location.protocol === 'file:') return;
  if (!('serviceWorker' in navigator)) return;
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}());
</script>
</body>
</html>
